name: DCO
on:
  pull_request:
permissions:
  contents: read
jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Signed-off-by on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          fail=0
          for sha in $(git rev-list "$BASE_SHA".."$HEAD_SHA"); do
            author="$(git show -s --format='%an' "$sha")"
            case "$author" in
              *'[bot]'*) echo "skip bot commit $sha ($author)"; continue ;;
            esac
            if ! git show -s --format='%B' "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::commit $sha is missing a Signed-off-by line"
              fail=1
            fi
          done
          exit $fail
