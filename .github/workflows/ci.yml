name: CI
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  build-test:
    name: Build & test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Show Swift version
        run: swift --version
      - name: Install cmake
        run: brew install cmake
      - name: Cache FreeRDP static build
        uses: actions/cache@v5
        with:
          path: |
            vendor/freerdp/include
            vendor/freerdp/lib
            vendor/freerdp/.cache
            vendor/freerdp/.build-stamp
          key: freerdp-${{ runner.os }}-${{ hashFiles('vendor/freerdp/PINS', 'script/build_freerdp.sh') }}
      - name: Build FreeRDP (pinned; offline after fetch)
        run: ./script/build_freerdp.sh
      - name: swift build
        run: swift build
      - name: swift test
        run: swift test
